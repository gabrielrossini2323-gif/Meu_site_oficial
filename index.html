<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i2GO Pro Series | Carbon Gold Edition</title>
    <!-- Fontes Premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS Externo -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="luxury-header">
        <div class="header-container">
            <a href="#" class="brand-logo">i2GO <span class="gold-text">PRO</span></a>
            <nav class="nav-menu">
                <a href="#especificacoes" class="nav-link">Especificações</a>
                <a href="#design" class="nav-link">Design</a>
                <a href="#suporte" class="nav-link">Suporte</a>
            </nav>
            <button class="cart-trigger" id="cart-btn">
                <svg class="cart-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M2.25 3h1.382a1.5 1.5 0 0 1 1.443 1.09l1.85 6.78a1.5 1.5 0 0 0 1.442 1.1h8.318a1.5 1.5 0 0 0 1.432-1.054L20.25 6H5.25" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="9" cy="18.5" r="1.5" fill="currentColor"/>
                    <circle cx="17" cy="18.5" r="1.5" fill="currentColor"/>
                </svg>
                <span class="cart-counter" id="cart-counter">0</span>
            </button>
        </div>
    </header>

    <main class="main-content">
        <section class="product-hero-section">
            <div class="hero-grid">
                
                <!-- Galeria Corrigida -->
                <div class="gallery-wrapper">
                    <div class="main-preview-glass">
                        <img id="main-product-image" src="Carregadorturbo.png" alt="i2GO Power Bank 10K PD Gold Edition" class="product-image">
                    </div>
                    <div class="thumbnail-row">
                        <button class="thumbnail-btn active" data-image="Carregadorturbo.png">
                            <img src="Carregadorturbo.png" alt="Vista Frontal">
                        </button>
                    </div>
                </div>

                <div class="product-info-panel">
                    <span class="category-tag">Edição Limitada Carbon Gold</span>
                    <h1 class="product-title">Power Bank 10K PD <br><span class="gold-gradient-text">Pro Series 20W</span></h1>
                    
                    <div class="rating-bar">
                        <div class="stars-gold">★★★★★</div>
                        <span class="rating-text">4.9 (142 avaliações)</span>
                    </div>

                    <div class="price-box-glass">
                        <span class="original-price">R$ 249,00</span>
                        <div class="current-price-row">
                            <span class="currency">R$</span>
                            <span class="price-value">139,90</span>
                        </div>
                    </div>

                    <p class="product-description">
                        Uma obra de engenharia refinada. Revestido com fibra de carbono, 20W de potência e visor LED digital.
                    </p>

                    <div class="cta-actions-group">
                        <button class="btn-secondary-luxury" id="add-to-cart-btn">Adicionar ao Carrinho</button>
                        <button class="btn-primary-luxury" id="buy-now-btn">Comprar Agora</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div class="toast-notification-container" id="toast-container"></div>
    <script src="main.js" defer></script>
</body>
</html>
